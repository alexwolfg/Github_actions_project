name: GA Project

on:
# Force deployment, push on main and push on pull_request
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"

  pull_request:
    types:
      - opened
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: deploy-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependecies
        run: |
          npm install pagefind@latest --save-dev
          npm ci

      - name: Run the linters
        run: npm run lint:all

      - name: Run all scripts
        env: 
          URL_CHECKER_TIMEOUT: ${{ vars.URL_CHECKER_TIMEOUT }}
        run: |
          for file in script/*; do
            if [[ "$file" == *.js ]]; then
              node "$file"
            elif [ -x "$file" ]; then
              "$file"
            fi
          done

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
        
      - name: Install dependencies
        run: |
          npm install pagefind@latest --save-dev
          npm ci

      - name: Build site
        env: 
          PATH_PREFIX: /${{ github.event.repository.name }}/
        run: npm run eleventy:prod

      - name: Upload the contents
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build site
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: "_site"

      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="succeeded"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="failed"
          fi

          gh issue create --title "$(date) - Deployment: ${STATUS}" \
            --body "URL: ${{ steps.deployment.outputs.page_url }}"
